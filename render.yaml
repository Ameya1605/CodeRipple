services:
  - type: web
    name: coderipple-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: coderipple-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: coderipple-redis
          type: redis
          property: connectionString

  - type: redis
    name: coderipple-redis
    plan: free
    ipAllowList: []

  - type: web
    name: coderipple-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist

databases:
  - name: coderipple-db
    plan: free
